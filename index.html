<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>لنک برج • فائنل</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; background: #0a3622; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .dashboard { width: 100%; max-width: 420px; background: #0D1F1C; border-radius: 36px; box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 2px #2a5a4a inset; overflow: hidden; padding: 20px 18px 20px 18px; border: 1px solid #3b7a64; }
        .compact-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 4px; }
        .title-section h1 { color: #FFFFFF; font-size: 1.8rem; font-weight: 700; line-height: 1.1; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .title-section .subtitle { color: #A0D4B8; font-size: 0.75rem; font-weight: 400; margin-top: 2px; }
        .header-actions { display: flex; gap: 8px; }
        .icon-btn { background: #1F3E35; border: 1px solid #3E7B66; color: #FFE484; width: 44px; height: 44px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #0A1E17; transition: 0.1s; }
        .icon-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0A1E17; }
        .upload-card { background: #162E28; border-radius: 28px; padding: 18px 16px; margin-bottom: 18px; border: 1px solid #2F5E52; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2), 0 6px 0 #071A14; }
        .file-select-area { background: #1F3E35; border-radius: 60px; padding: 6px 6px 6px 22px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; border: 1px solid #3E7B66; }
        .file-select-area span { color: #c0d6cc; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-label { background: #0D5C3E; color: #FFD966; padding: 12px 18px; border-radius: 50px; font-weight: 700; font-size: 0.85rem; box-shadow: 0 5px 0 #053826; cursor: pointer; transition: all 0.1s; border: none; display: inline-block; text-align: center; min-width: 110px; }
        .file-label:active { transform: translateY(3px); box-shadow: 0 2px 0 #053826; }
        .file-label input { display: none; }
        .action-group { display: flex; gap: 10px; margin-top: 6px; }
        .btn { flex: 1; padding: 14px 5px; border: none; border-radius: 60px; font-weight: 700; font-size: 0.9rem; cursor: pointer; box-shadow: 0 6px 0 #0A1E17; transition: all 0.1s; text-align: center; background: #1E4036; color: #E0F2E0; border: 1px solid #3F7866; }
        .btn-primary { background: #0D5C3E; color: #FFE484; box-shadow: 0 6px 0 #053826; border: 1px solid #6FAA8C; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0A1E17; }
        .btn-primary:active { box-shadow: 0 2px 0 #053826; }
        #status-message { color: #9FCCB2; margin-top: 14px; font-size: 0.8rem; min-height: 20px; text-align: center; }
        #preview-area { margin: 8px 0 0; text-align: center; }
        #preview-area img, #preview-area video { max-width: 100%; border-radius: 24px; max-height: 100px; }
        .chat-section { background: #132A23; border-radius: 30px; padding: 18px 14px 14px; border: 1px solid #2F6652; box-shadow: inset 0 1px 4px #0A1A14, 0 6px 0 #0A1E17; }
        .chat-header { display: flex; align-items: center; gap: 8px; color: #E0F2DA; padding-bottom: 10px; border-bottom: 1.5px solid #2B5F4C; margin-bottom: 10px; }
        .chat-header .dot { width: 10px; height: 10px; background: #3FE88A; border-radius: 50%; box-shadow: 0 0 8px #2ecc71; }
        .chat-header span { font-weight: 600; font-size: 0.95rem; }
        .chat-messages { height: 260px; overflow-y: auto; padding-right: 4px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
        .msg-row { display: flex; flex-direction: column; }
        .bubble { max-width: 90%; padding: 12px 14px; border-radius: 22px; font-size: 0.9rem; line-height: 1.4; word-break: break-word; }
        .bot-msg { align-items: flex-start; }
        .bot-msg .bubble { background: #1F4A3A; color: #EAF6EE; border-bottom-left-radius: 8px; border: 1px solid #387A60; }
        .user-msg { align-items: flex-end; }
        .user-msg .bubble { background: #1B4D5E; color: #ffffff; border-bottom-right-radius: 8px; border: 1px solid #338299; align-self: flex-end; }
        .time-stamp { font-size: 0.65rem; color: #89B7A2; margin-top: 5px; margin-left: 10px; }
        .user-msg .time-stamp { text-align: right; margin-right: 8px; }
        .chat-input-area { display: flex; gap: 10px; background: #1E4036; border-radius: 60px; padding: 5px 5px 5px 20px; border: 1px solid #3C7A64; }
        .chat-input-area input { flex: 1; background: transparent; border: none; color: white; font-size: 0.9rem; outline: none; }
        .chat-input-area input::placeholder { color: #9CBFAE; }
        .send-chat-btn { background: #0D5C3E; border: none; color: #FFDF7E; font-weight: bold; font-size: 1.2rem; padding: 10px 22px; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 0 #053826; transition: 0.1s; }
        .send-chat-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #053826; }
        .signature { margin-top: 16px; color: #7FAA97; font-size: 0.75rem; text-align: right; border-top: 1px dashed #2B5F4C; padding-top: 12px; }
        .signature span { color: #FFE484; font-weight: 600; }    </style>
</head>
<body>
<div class="dashboard">
    <div class="compact-header">
        <div class="title-section">
            <h1> GMD SPARK</h1>
            <div class="subtitle">محفوظ اپلوڈ • اسمارٹ اسسٹنٹ</div>
        </div>
        <div class="header-actions">
            <div class="icon-btn" onclick="action('like')">❤️</div>
            <div class="icon-btn" onclick="action('share')">📤</div>
            <div class="icon-btn" onclick="action('copy')">📋</div>
        </div>
    </div>
    <div class="upload-card">
        <div class="file-select-area">
            <span id="selected-file-name">کوئی فائل منتخب نہیں</span>
            <label class="file-label">
                فائل منتخب کریں
                <input type="file" id="file-input" accept="image/*,video/*">
            </label>
        </div>
        <div id="preview-area"></div>
        <div class="action-group">
            <button class="btn btn-primary" onclick="uploadFile()">🚀 سرور پر بھیجیں</button>
            <button class="btn" onclick="previewFile()">👁️ پریویو</button>
        </div>
        <div id="status-message"></div>
    </div>
    <div class="chat-section">
        <div class="chat-header">
            <span class="dot"></span>
            <span>اسسٹنٹ (آن لائن)</span>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="msg-row bot-msg">
                <div class="bubble">السلام علیکم! میں آپ کی کیا مدد کر سکتا ہوں؟</div>
                <div class="time-stamp">ابھی</div>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="پیغام لکھیں..." autocomplete="off">
            <button class="send-chat-btn" onclick="sendChatMessage()">➤</button>
        </div>
    </div>
    <div class="signature">
        : <span id="student-name">DEVELOPER BY MATEEN SUMDANI +923007956507</span>
    </div>
</div><script>
    let currentFile = null;
    const fileInput = document.getElementById('file-input');
    const fileNameDisplay = document.getElementById('selected-file-name');
    const previewArea = document.getElementById('preview-area');
    const statusMsg = document.getElementById('status-message');
    fileInput.addEventListener('change', (e) => {
        currentFile = e.target.files[0];
        fileNameDisplay.innerText = currentFile ? `📁 ${currentFile.name}` : 'کوئی فائل منتخب نہیں';
        previewArea.innerHTML = '';
        statusMsg.innerText = '';
    });
    function previewFile() {
        if (!currentFile) { statusMsg.innerText = '⚠️ پہلے فائل منتخب کریں'; return; }
        const url = URL.createObjectURL(currentFile);
        previewArea.innerHTML = '';
        if (currentFile.type.startsWith('image')) { previewArea.innerHTML = `<img src="${url}" alt="preview">`; } 
        else if (currentFile.type.startsWith('video')) { previewArea.innerHTML = `<video src="${url}" controls></video>`; } 
        else { previewArea.innerHTML = '<p style="color:#ccc;">📄 یہ فائل پریویو نہیں ہو سکتی</p>'; }
    }
    async function uploadFile() {
        if (!currentFile) { statusMsg.innerText = '❌ پہلے فائل منتخب کریں'; return; }
        const formData = new FormData();
        formData.append('myFile', currentFile);
        statusMsg.innerText = '⏳ سرور سے رابطہ ہو رہا ہے...';
        try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            statusMsg.innerText = `✅ ${data.message}`;
        } catch (err) { statusMsg.innerText = '❌ سرور آف لائن ہے۔ server.js چلائیں۔'; }
    }
    function action(type) {
        if (type === 'like') alert('❤️ آپ نے لائک کیا!');
        else if (type === 'share') alert('📤 شیئر کا ڈیمو (اصلی شیئر ڈائیلاگ)');
        else if (type === 'copy') { navigator.clipboard?.writeText(': طالب علم'); alert('📋 ٹیکسٹ کاپی ہو گیا!'); }
    }
    const chatBox = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    function addMessage(text, sender) {
        const row = document.createElement('div');
        row.className = `msg-row ${sender}-msg`;
        const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.innerText = text;
        const time = document.createElement('div'); time.className = 'time-stamp'; time.innerText = new Date().toLocaleTimeString('ur-PK', { hour: '2-digit', minute: '2-digit' });
        row.appendChild(bubble); row.appendChild(time); chatBox.appendChild(row); chatBox.scrollTop = chatBox.scrollHeight;
    }
    function sendChatMessage() {
        const text = chatInput.value.trim(); if (!text) return;
        addMessage(text, 'user'); chatInput.value = '';
        setTimeout(() => {
            let reply = 'معذرت، میں ابھی سیکھ رہا ہوں۔';            const lower = text.toLowerCase();
            if (lower.includes('سلام')) reply = 'وعلیکم السلام و رحمۃ اللہ!';
            else if (lower.includes('انکل')) reply = 'انکل تو بہت شرارتی ہیں 😄';
            else if (lower.includes('فائل')) reply = 'اوپر دیے گئے بٹن سے فائل اپلوڈ کریں۔';
            addMessage(reply, 'bot');
        }, 500);
    }
    chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(); });
</script>
</body>
</html>
